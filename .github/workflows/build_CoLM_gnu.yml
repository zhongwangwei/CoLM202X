name: Build_CoLM202X_gnu
on:
  pull_request:
    branches: 
      - master
    paths-ignore:
      - 'postprocess/**'
      - 'preprocess/**'
      - 'README.md'
      - '.gitignore'
  push:
    branches:
      - master
    paths-ignore:
      - 'postprocess/**'
      - 'preprocess/**'
      - 'README.md'
      - '.gitignore'
  workflow_dispatch:

jobs:
  Tracer-Tests:
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v4
     - uses: mpi4py/setup-mpi@v1
       with:
          mpi: openmpi
     - uses: fortran-lang/setup-fortran@v1
       with:
          compiler: gcc
          version: 12
     - name: Install test dependencies
       run: python -m pip install pytest
     - name: Run Python tests
       run: python -m pytest -q
     - name: Run MPI evaluator
       if: ${{ always() }}
       run: ./tests/run_river_mpi_evaluator.sh

  Build-CoLM-gnu:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-22.04]
        mpi: ['mpich', 'openmpi', 'intelmpi']
        toolchain:
          - {compiler: gcc, version: 14}
          - {compiler: gcc, version: 13}
          - {compiler: gcc, version: 12}
          - {compiler: gcc, version: 11}
          - {compiler: gcc, version: 10}
          - {compiler: gcc, version:  9}
       # include:
       #   - os: ubuntu-latest
       #     toolchain: {compiler: gcc, version: 12}
        exclude:
          - os: ubuntu-22.04
            toolchain: {compiler: gcc, version: 14}
          - mpi: 'mpich'
            toolchain: {compiler: gcc, version: 9}
            # mpich compiling FCFLAG has --fallow-type-mismatch, and will cause gfortran 9 failing
          - os: ubuntu-latest
            toolchain: {compiler: gcc, version: 9}
          - os: ubuntu-latest
            toolchain: {compiler: gcc, version: 10}
          - os: ubuntu-latest
            toolchain: {compiler: gcc, version: 11}

    steps:
     - uses: actions/checkout@v4
     - uses: mpi4py/setup-mpi@v1
       with:
          mpi: ${{ matrix.mpi }}
     - uses: fortran-lang/setup-fortran@v1
       id: setup-fortran
       with:
          compiler: ${{ matrix.toolchain.compiler }}
          version: ${{ matrix.toolchain.version }} 
     - name: Install netcdf-fortran and blas library
       shell: bash -l {0}
       run: sudo apt update && sudo apt install -y netcdf-bin libnetcdf-dev libnetcdff-dev "liblapack*" "libblas*"
     - name: Test mpi
       #run: mpif90 -v
       run: which mpif90
     #- name: Test netcdf
     #  run: nc-config --all
     - name: Build CoLM202X
     #  run: make clean && make all
       run: |
            cd ${{ github.workspace }}
            TestList=./.github/workflows/TestCaseLists
            for CaseName in `awk '{print $1}' $TestList`
            do
              echo "+++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++"
              echo "Create test cases"
              echo $CaseName
              echo "+++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++++"
 
              echo defineh `cat $TestList |grep $CaseName |awk '{print $2,$3,$4,$5,$6,$7,$8,$9}'`
              ./.github/workflows/create_defineh.bash `cat $TestList |grep $CaseName |awk '{print $2,$3,$4,$5,$6,$7,$8,$9}'`

              echo "Create test case $CaseName Complete!"
              cat ./include/define.h

              echo "...................................................................."
              echo "Start Compilation $CaseName"
              echo "...................................................................."
 
              make clean && make all
            done

            echo "----------------------------------------------------------------------"
            echo "All test cases are compiled successfully! "
            echo "----------------------------------------------------------------------"
